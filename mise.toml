[tools]
"github:lucasew/workspaced" = "0.2.1"
go = "1.25.7"
goreleaser = "2.15.4"
svu = "3.3.0"

[tasks.lint]
run = "workspaced codebase lint"

[tasks.format]
run = "workspaced codebase format"

[tasks.build]
run = "go build ./..."

[tasks.fmt]
run = "workspaced codebase format"

[tasks."test:go"]
run = "go test -count=1 ./..."

[tasks.test]
depends = ["test:*"]

[tasks.codegen]
depends = ["codegen:*"]

[tasks.install]
depends = ["install:*"]

[tasks.ci]
depends = ["lint", "test"]

[tasks."docker:build"]
run = "echo docker build"

[tasks."docker:push"]
run = "echo docker push"

[tasks.release]
description = "Run a release"
depends = ["ci"]
usage = '''
arg "<version>" help="New version" {
  choices "next" "major" "minor" "patch"
  default "next"
}
'''
run = '''
git tag $(svu ${usage_version})
goreleaser release --clean
'''
